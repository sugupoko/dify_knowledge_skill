      person_days: 7
      llm_api_cost: "0円（Ollama Self-hostedのため）"
    monthly:
      server_cost_min: "3000円/月（既存サーバー流用時）"
      server_cost_max: "58000円/月（新規GPUサーバー調達時）"
      maintenance_hours: 5.2
      maintenance_cost: "15500円/月（時給3,000円換算）"
      llm_api_cost: "0円/月（Ollama Self-hostedのため）"
    roi:
      current_monthly_cost: "150000円/月（月50時間 × 3,000円）"
      estimated_monthly_saving: "75000円/月（50%削減）"
      estimated_monthly_running: "19000〜24000円/月"
      net_monthly_saving: "51000〜56000円/月"
      payback_period: "約3ヶ月"

  # FAQ追加計画
  faq_addition_plan:
    high_priority_count: 5
    high_priority_estimated_hours: 2.5
    target_timing: "全社展開前（パイロット評価後）"
